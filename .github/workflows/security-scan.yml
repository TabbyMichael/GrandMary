name: Security Scan Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run security scan daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests
        
    - name: Run Leak Detection Scan
      run: |
        echo "🔍 Running security leak detection scan..."
        python leak-detector.py . --json --output security-scan-results.json
        echo "✅ Leak detection scan completed"
        
    - name: Analyze Security Score
      run: |
        SECURITY_SCORE=$(jq -r '.summary.security_score' security-scan-results.json)
        echo "📊 Security Score: $SECURITY_SCORE/100"
        
        if [ "$SECURITY_SCORE" -lt 80 ]; then
          echo "❌ SECURITY SCORE BELOW THRESHOLD (80)"
          jq '.findings_by_severity.CRITICAL[]? | "🚨 CRITICAL: \(.file):\(.line) - \(.description)"' security-scan-results.json || true
          jq '.findings_by_severity.HIGH[]? | "⚠️  HIGH: \(.file):\(.line) - \(.description)"' security-scan-results.json || true
          exit 1
        else
          echo "✅ SECURITY SCORE MEETS REQUIREMENTS"
        fi
        
    - name: Run Penetration Tests
      run: |
        echo "🔍 Running penetration tests..."
        python security-penetration-tests.py --url http://localhost:3001 --output pentest-results.json --format json || true
        echo "✅ Penetration tests completed"
        
    - name: Upload Security Reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-reports
        path: |
          security-scan-results.json
          pentest-results.json
        retention-days: 30
        
    - name: Comment PR with Security Results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          
          try {
            const securityResults = JSON.parse(fs.readFileSync('security-scan-results.json', 'utf8'));
            const score = securityResults.summary.security_score;
            const critical = securityResults.summary.critical;
            const high = securityResults.summary.high;
            
            let comment = `## 🔍 Security Scan Results\n\n`;
            comment += `**Security Score:** ${score}/100\n\n`;
            comment += `### 📊 Findings:\n`;
            comment += `- 🔴 Critical: ${critical}\n`;
            comment += `- 🟠 High: ${high}\n`;
            comment += `- 🟡 Medium: ${securityResults.summary.medium}\n`;
            comment += `- 🟢 Low: ${securityResults.summary.low}\n\n`;
            
            if (critical > 0 || high > 0) {
              comment += `### 🚨 Security Issues Found\n\n`;
              comment += `Please address the security issues before merging.\n\n`;
            } else {
              comment += `### ✅ Security Check Passed\n\n`;
              comment += `No critical or high security issues detected.\n\n`;
            }
            
            comment += `### 📄 Detailed Report\n\n`;
            comment += `View the [full security report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for more details.\n`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          } catch (error) {
            console.log('Error reading security results:', error);
          }
          
    - name: Security Gate Check
      run: |
        SECURITY_SCORE=$(jq -r '.summary.security_score' security-scan-results.json)
        CRITICAL_COUNT=$(jq -r '.summary.critical' security-scan-results.json)
        HIGH_COUNT=$(jq -r '.summary.high' security-scan-results.json)
        
        echo "🔐 Security Gate Check:"
        echo "  Score: $SECURITY_SCORE/100"
        echo "  Critical: $CRITICAL_COUNT"
        echo "  High: $HIGH_COUNT"
        
        # Security gate conditions
        if [ "$SECURITY_SCORE" -lt 80 ] || [ "$CRITICAL_COUNT" -gt 0 ] || [ "$HIGH_COUNT" -gt 2 ]; then
          echo "❌ SECURITY GATE FAILED"
          echo "Security requirements not met. Please fix issues before proceeding."
          exit 1
        else
          echo "✅ SECURITY GATE PASSED"
          echo "All security requirements met. Proceeding with deployment."
        fi

  dependency-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
        
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  secrets-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Run Gitleaks
      uses: zricethezav/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Run TruffleHog
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD

  security-dashboard:
    runs-on: ubuntu-latest
    needs: [security-scan, dependency-scan, secrets-scan]
    if: always()
    
    steps:
    - name: Download security reports
      uses: actions/download-artifact@v3
      with:
        name: security-reports
        
    - name: Generate Security Dashboard
      run: |
        echo "🏗️  Generating security dashboard..."
        
        # Create comprehensive security report
        cat > security-dashboard.md << 'EOF'
        # 🔐 Security Dashboard
        
        ## 📊 Overall Security Status
        
        | Metric | Status |
        |--------|--------|
        | Security Score | $(jq -r '.summary.security_score' security-scan-results.json)/100 |
        | Critical Issues | $(jq -r '.summary.critical' security-scan-results.json) |
        | High Issues | $(jq -r '.summary.high' security-scan-results.json) |
        | Scan Date | $(date -u +"%Y-%m-%d %H:%M:%S UTC") |
        
        ## 🚨 Critical Issues
        
        $(jq -r '.findings_by_severity.CRITICAL[]? | "- \(.file):\(.line) - \(.description)"' security-scan-results.json || echo "None")
        
        ## ⚠️ High Priority Issues
        
        $(jq -r '.findings_by_severity.HIGH[]? | "- \(.file):\(.line) - \(.description)"' security-scan-results.json || echo "None")
        
        ## 🔍 Next Steps
        
        - [ ] Address all critical and high security issues
        - [ ] Review security scan results
        - [ ] Update security policies if needed
        - [ ] Schedule follow-up security audit
        
        ---
        *Report generated automatically on $(date -u +"%Y-%m-%d %H:%M:%S UTC")*
        EOF
        
        echo "✅ Security dashboard generated"
        
    - name: Upload Security Dashboard
      uses: actions/upload-artifact@v3
      with:
        name: security-dashboard
        path: security-dashboard.md
        retention-days: 90
