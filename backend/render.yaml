services:
  # Type of service to deploy
  - type: web
    name: everbloom-backend
    env: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    healthCheckPath: /api/health
    
    # Environment variables
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
      - key: DB_PRIMARY
        value: supabase
      - key: DB_FALLBACK_ENABLED
        value: true
      - key: RATE_LIMIT_WINDOW_MS
        value: 900000
      - key: RATE_LIMIT_MAX_REQUESTS
        value: 100
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: PASSWORD_PEPPER
        generateValue: true

    # Auto-deploy configuration
    autoDeploy: true
    
    # Health check configuration
    healthCheck:
      path: /api/health
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
      successThreshold: 2

    # Resource limits
    resources:
      memory: 512Mi
      cpu: 0.5

    # Scaling configuration
    scaling:
      minInstances: 1
      maxInstances: 2
      targetCPUPercent: 70
      targetMemoryPercent: 80

# Build configuration
build:
  baseImage: node:20
  buildCommand: cd backend && npm install
  startCommand: cd backend && npm start

# Headers configuration
headers:
  - path: "/*"
    headers:
      X-Frame-Options: "DENY"
      X-Content-Type-Options: "nosniff"
      X-XSS-Protection: "1; mode=block"
      Referrer-Policy: "strict-origin-when-cross-origin"
      Strict-Transport-Security: "max-age=31536000; includeSubDomains; preload"
      Permissions-Policy: "camera=(), microphone=(), geolocation=(), payment=(), usb=(), magnetometer=(), gyroscope=(), accelerometer=()"

# CORS configuration
cors:
  - path: "/api/*"
    origin:
      - "https://everbloom-memorial.netlify.app"
      - "https://www.everbloom-memorial.netlify.app"
    methods:
      - "GET"
      - "POST"
      - "PUT"
      - "DELETE"
      - "OPTIONS"
    allowedHeaders:
      - "Origin"
      - "X-Requested-With"
      - "Content-Type"
      - "Accept"
      - "Authorization"
      - "X-Request-ID"
    credentials: true
    maxAge: 86400

# Security configuration
security:
  - path: "/*"
    headers:
      Content-Security-Policy: "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://*.supabase.co; frame-src 'none'; object-src 'none'; media-src 'self' blob:; manifest-src 'self'; worker-src 'self' blob:;"

# Rate limiting
rateLimit:
  - path: "/api/*"
    windowMs: 900000  # 15 minutes
    max: 100
    message:
      error: "Too many requests from this IP, please try again later."
    standardHeaders: true
    legacyHeaders: false

# Monitoring configuration
monitoring:
  - path: "/api/health"
    interval: 30
    timeout: 5
    retries: 3

# Logging configuration
logging:
  level: info
  format: json
  exclude:
    - password
    - token
    - secret
    - key
    - auth
    - authorization
